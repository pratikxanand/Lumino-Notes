<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumino AI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;

}

.ai{

width:100%;
max-width:900px;
height:90vh;

background:#1f2937;

border-radius:20px;

display:flex;
flex-direction:column;

overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,.5);

}

.header{

background:#4f46e5;

padding:18px;

display:flex;

align-items:center;

gap:10px;

color:#fff;

font-size:22px;

}

.chat{

flex:1;

overflow-y:auto;

padding:20px;

}

.user{

margin:10px 0;

background:#4f46e5;

color:#fff;

padding:12px 15px;

border-radius:15px;

margin-left:auto;

width:fit-content;

max-width:70%;

}

.bot{

margin:10px 0;

background:#374151;

color:#fff;

padding:12px 15px;

border-radius:15px;

width:fit-content;

max-width:70%;

white-space:pre-wrap;

}

.input{

display:flex;

padding:15px;

gap:10px;

background:#1f2937;

}

input{

flex:1;

padding:15px;

border:none;

outline:none;

border-radius:10px;

background:#374151;

color:white;

font-size:15px;

}

button{

width:60px;

border:none;

border-radius:10px;

background:#4f46e5;

color:white;

cursor:pointer;

font-size:18px;

}

button:hover{

background:#4338ca;

}

</style>

</head>

<body>

<div class="ai">

<div class="header">

<i class="fa-solid fa-robot"></i>

<b>Lumino AI</b>

</div>

<div id="chat" class="chat"></div>

<div class="input">

<input
id="prompt"
placeholder="Ask Lumino AI...">

<button id="send">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

</div>

<script>

const API_KEY=prompt("Enter your Gemini API Key");

const chat=document.getElementById("chat");

const input=document.getElementById("prompt");

const send=document.getElementById("send");

send.onclick=askAI;

input.addEventListener("keypress",e=>{

if(e.key==="Enter") askAI();

});

async function askAI(){

const prompt=input.value.trim();

if(!prompt) return;

chat.innerHTML+=`
<div class="user">${prompt}</div>
`;

input.value="";

chat.innerHTML+=`
<div class="bot" id="loading">
<i class="fa-solid fa-spinner fa-spin"></i>
 Thinking...
</div>
`;

chat.scrollTop=chat.scrollHeight;

try{

const response=await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${API_KEY}`,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

contents:[

{

parts:[

{

text:prompt

}

]

}

]

})

}

);

const data=await response.json();

document.getElementById("loading").remove();

const reply=data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

chat.innerHTML+=`
<div class="bot">${reply}</div>
`;

chat.scrollTop=chat.scrollHeight;

}

catch(err){

document.getElementById("loading").remove();

chat.innerHTML+=`
<div class="bot">❌ Error connecting to Gemini.</div>
`;

console.log(err);

}

}

</script>

</body>
</html>
