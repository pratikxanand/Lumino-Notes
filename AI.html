<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumino AI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#0f172a;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

/* ========================= */

.ai{

width:100%;

max-width:950px;

height:90vh;

background:#1e293b;

border-radius:22px;

overflow:hidden;

display:flex;

flex-direction:column;

box-shadow:0 20px 50px rgba(0,0,0,.45);

}

/* ========================= */

.header{

height:70px;

background:#4f46e5;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 20px;

color:white;

}

.logo{

display:flex;

align-items:center;

gap:12px;

font-size:22px;

font-weight:bold;

}

.header-right{

display:flex;

align-items:center;

gap:12px;

}

.icon-btn{

width:45px;

height:45px;

border:none;

border-radius:12px;

background:rgba(255,255,255,.15);

color:white;

cursor:pointer;

font-size:18px;

transition:.3s;

}

.icon-btn:hover{

background:white;

color:#4f46e5;

}

/* ========================= */

.chat{

flex:1;

overflow-y:auto;

padding:25px;

background:#111827;

}

.chat::-webkit-scrollbar{

width:8px;

}

.chat::-webkit-scrollbar-thumb{

background:#374151;

border-radius:20px;

}

/* ========================= */

.user{

margin:15px 0;

margin-left:auto;

width:fit-content;

max-width:75%;

padding:14px 18px;

background:#4f46e5;

color:white;

border-radius:18px 18px 4px 18px;

word-wrap:break-word;

}

.bot{

margin:15px 0;

width:fit-content;

max-width:75%;

padding:14px 18px;

background:#374151;

color:white;

border-radius:18px 18px 18px 4px;

white-space:pre-wrap;

line-height:1.6;

word-wrap:break-word;

}

/* ========================= */

.input-area{

padding:18px;

display:flex;

gap:12px;

background:#1e293b;

border-top:1px solid #334155;

}

.input-area input{

flex:1;

padding:15px;

border:none;

outline:none;

border-radius:14px;

background:#374151;

color:white;

font-size:15px;

}

.input-area input::placeholder{

color:#cbd5e1;

}

.send{

width:60px;

border:none;

border-radius:14px;

background:#4f46e5;

color:white;

cursor:pointer;

font-size:20px;

transition:.3s;

}

.send:hover{

background:#4338ca;

transform:scale(1.05);

}

/* ========================= */

.loading{

opacity:.8;

font-style:italic;

}

</style>

</head>

<body>

<div class="ai">

<!-- HEADER -->

<div class="header">

<div class="logo">

<i class="fa-solid fa-robot"></i>

<span>Lumino AI</span>

</div>

<div class="header-right">

<button
class="icon-btn"
id="changeKey">

<i class="fa-solid fa-key"></i>

</button>

<button
class="icon-btn"
id="clearChat">

<i class="fa-solid fa-trash"></i>

</button>

</div>

</div>

<!-- CHAT -->

<div
class="chat"
id="chat">

<div class="bot">

👋 Hello!

I'm <b>Lumino AI</b>.

Ask me anything!

</div>

</div>

<!-- INPUT -->

<div class="input-area">

<input

type="text"

id="prompt"

placeholder="Ask Lumino AI...">

<button
class="send"
id="send">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

<script>

// =====================================
// GEMINI API KEY
// =====================================

let API_KEY = localStorage.getItem("geminiKey");

if(!API_KEY){

    const key = prompt("Enter your Gemini API Key");

    if(key){

        API_KEY = key;

        localStorage.setItem("geminiKey", key);

    }else{

        alert("Gemini API Key is required.");

    }

}

// =====================================
// ELEMENTS
// =====================================

const chat = document.getElementById("chat");

const promptInput = document.getElementById("prompt");

const sendBtn = document.getElementById("send");

const changeKeyBtn = document.getElementById("changeKey");

const clearChatBtn = document.getElementById("clearChat");

// =====================================
// CHANGE API KEY
// =====================================

changeKeyBtn.addEventListener("click",()=>{

    const newKey = prompt("Enter New Gemini API Key");

    if(!newKey) return;

    API_KEY = newKey;

    localStorage.setItem("geminiKey", newKey);

    alert("✅ API Key Updated!");

});

// =====================================
// CLEAR CHAT
// =====================================

clearChatBtn.addEventListener("click",()=>{

    if(confirm("Clear chat?")){

        chat.innerHTML=`

        <div class="bot">

        👋 Hello!

        I'm <b>Lumino AI</b>.

        Ask me anything!

        </div>

        `;

    }

});

// =====================================
// SEND
// =====================================

sendBtn.addEventListener("click", askAI);

promptInput.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        askAI();

    }

});

// =====================================
// ADD MESSAGE
// =====================================

function addUserMessage(text){

    chat.innerHTML += `

    <div class="user">

        ${text}

    </div>

    `;

}

function addBotMessage(text){

    chat.innerHTML += `

    <div class="bot">

        ${text}

    </div>

    `;

}

function scrollBottom(){

    chat.scrollTop = chat.scrollHeight;

}

// =====================================
// GEMINI AI
// =====================================

async function askAI(){

    const prompt = promptInput.value.trim();

    if(prompt === "") return;

    addUserMessage(prompt);

    promptInput.value = "";

    chat.innerHTML += `

    <div class="bot loading" id="loading">

        <i class="fa-solid fa-spinner fa-spin"></i>

        Thinking...

    </div>

    `;

    scrollBottom();

    try{

        const response = await fetch(

        `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${API_KEY}`,

        {

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                contents:[

                    {

                        parts:[

                            {

                                text:prompt

                            }

                        ]

                    }

                ]

            })

        });

        const data = await response.json();

        document.getElementById("loading")?.remove();

        if(data.error){

            throw new Error(data.error.message);

        }

        const reply =

        data.candidates?.[0]?.content?.parts

        ?.map(part=>part.text)

        .join("") ||

        "No response from Gemini.";

        addBotMessage(reply);

        scrollBottom();

    }

    catch(error){

        document.getElementById("loading")?.remove();

        addBotMessage(

            "❌ " + error.message

        );

        console.error(error);

    }

}

// =====================================
// AUTO FOCUS
// =====================================

promptInput.focus();

</script>

</div>

</body>

</html>
