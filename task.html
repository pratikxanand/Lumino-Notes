<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/mainlogo.png">
    <title>Lumino Notes</title>

   

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    
    <link rel="stylesheet" href="css/task.css">
    <link rel="stylesheet" href="css/task-ui.css">
   

<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-book-open"></i>
            <h2>Lumino Notes</h2>
        </div>
        <div class="bell">
            <i class="fa-solid fa-bell"></i>
        </div>
        

       
    </header>
    


    <!-- HEADER -->

    <header class="task-header">

        <h1>

            My Tasks

        </h1>

       

    </header>

    <section class="search-section">

        <input
        type="text"
        id="searchTask"
        placeholder="Search Tasks...">

    </section>
   <!-- ===========================
TASK STATS
=========================== -->

<section class="task-stats">

    <div class="stat-card">

        <div class="stat-icon">
            <i class="fa-solid fa-list-check"></i>
        </div>

        <div class="stat-info">
            <h2 id="totalTasks">0</h2>
            <p>Total Tasks</p>
        </div>

    </div>

    <div class="stat-card">

        <div class="stat-icon completed">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <div class="stat-info">
            <h2 id="completedTasks">0</h2>
            <p>Completed</p>
        </div>

    </div>

    <div class="stat-card">

        <div class="stat-icon pending">
            <i class="fa-solid fa-clock"></i>
        </div>

        <div class="stat-info">
            <h2 id="pendingTasks">0</h2>
            <p>Pending</p>
        </div>

    </div>

    <div class="stat-card">

        <div class="stat-icon high">
            <i class="fa-solid fa-bolt"></i>
        </div>

        <div class="stat-info">
            <h2 id="highPriorityTasks">0</h2>
            <p>High Priority</p>
        </div>

    </div>

</section>
   
    
    
<nav class="bottom-nav">


<button id="addTaskBtn">

<i class="fa-solid fa-circle-plus"></i>

<span>Add</span>

</button>

<button onclick="window.location.href='task.html'">

<i class="fa-solid fa-list-check"></i>

<span>Tasks</span>

</button>

<button>

<i class="fa-solid fa-clock"></i>

<span>Focus</span>

</button>

<button id="settingsBtn">

<i class="fa-solid fa-gear"></i>

<span>Settings</span>

</button>

<button id="archivePopupBtn" >
    <i class="fa-solid fa-box-archive"></i>
    Archive
</button>

</nav>



    

    <section id="taskContainer">

    </section>
<div class="popup" id="taskPopup">
  <div class="popup-box">

    <h2>New Task</h2>

    <label>Task Title</label>
    <input type="text" id="taskTitle">

    <div class="form-row">
      <div>
        <label>Due Date</label>
        <input type="date" id="taskDate">
      </div>

      <div>
        <label>Priority</label>
        <select id="taskPriority">
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </div>

    <label>Category</label>
    <select id="taskCategory">
      <option>Study</option>
      <option>Work</option>
      <option>Personal</option>
    </select>

    <div class="checkbox-row">
      <input type="checkbox" id="taskCompleted">
      <label for="taskCompleted">Mark as completed</label>
    </div>

    <div class="popup-actions">
      <button class="cancel-btn">Cancel</button>
      <button class="save-btn">Save Task</button>
    </div>

  </div>
</div>

 <div class="settings-popup" id="settingsPopup">

    <div class="settings-box">

        <div class="settings-header">

            <h2>⚙️ Settings</h2>

            <button id="closeSettings">
                <i class="fa-solid fa-xmark"></i>
            </button>

        </div>

        <div class="setting-item">

            <label>Theme</label>


    <div class="theme-grid">

    <div class="theme-card active" data-theme="dark">
        🌙
        <span>Dark</span>
    </div>

    <div class="theme-card" data-theme="light">
        ☀️
        <span>Light</span>
    </div>

    <div class="theme-card" data-theme="pink">
        💗
        <span>Pink</span>
    </div>

    <div class="theme-card" data-theme="orange">
        🧡
        <span>Orange</span>
    </div>

    <div class="theme-card" data-theme="purple">
        💜
        <span>Purple</span>
    </div>

    <div class="theme-card" data-theme="emerald">
        💚
        <span>Emerald</span>
    </div>

    <div class="theme-card" data-theme="crimson">
        ❤️
        <span>Crimson</span>
    </div>

    <div class="theme-card" data-theme="ocean">
        🌊
        <span>Ocean</span>
    </div>

</div>

        </div>

        <button id="saveSettings">

            Save Settings

        </button>

    </div>

 
<script src="js/tasks.js"></script>
<script src="js/setting.js"></script>

</body>
</html>
